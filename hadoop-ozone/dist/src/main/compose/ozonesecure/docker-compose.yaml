# reusable fragments
x-common-config:
  &common-config
  image: ${OZONE_RUNNER_IMAGE}:${OZONE_RUNNER_VERSION}
  dns_search: .
  volumes:
    - ../..:/opt/hadoop
    - ../_keytabs:/etc/security/keytabs
    - ./krb5.conf:/etc/krb5.conf
  env_file:
    - docker-config
  depends_on:
    kdc:
      condition: service_healthy

services:
  kdc:
    image: ${OZONE_TESTKRB5_IMAGE}
    hostname: kdc
    dns_search: .
    volumes:
      - ../..:/opt/hadoop
      - ../_keytabs:/etc/security/keytabs
    command: ["/opt/hadoop/compose/common/init-kdc.sh"]
  kms:
    image: ${HADOOP_IMAGE}:${HADOOP_VERSION}
    hostname: kms
    dns_search: .
    ports:
    - 9600:9600
    env_file:
    - ./docker-config
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ../../libexec/transformation.py:/opt/transformation.py
    command: ["hadoop", "kms"]
  datanode:
    <<: *common-config
    hostname: dn
    ports:
      - 19864
    command: ["/opt/hadoop/bin/ozone","datanode"]
    environment:
      OZONE_OPTS:
  om:
    <<: *common-config
    hostname: om
    ports:
      - 9874:9874
      - 9862:9862
    environment:
      ENSURE_OM_INITIALIZED: /data/metadata/om/current/VERSION
      OZONE_OM_OPTS: -Dcom.sun.net.ssl.checkRevocation=false
      OZONE_OPTS:
    command: ["/opt/hadoop/bin/ozone","om"]
  httpfs:
    <<: *common-config
    hostname: httpfs
    ports:
      - 14000:14000
    command: [ "/opt/hadoop/bin/ozone","httpfs" ]
    environment:
      OZONE-SITE.XML_hdds.scm.safemode.min.datanode: ${OZONE_SAFEMODE_MIN_DATANODES:-1}
      OZONE_OPTS:
  s3g:
    <<: *common-config
    hostname: s3g
    ports:
      - 9878:9878
    command: ["/opt/hadoop/bin/ozone","s3g", "-Dozone.om.transport.class=${OZONE_S3_OM_TRANSPORT:-org.apache.hadoop.ozone.om.protocolPB.GrpcOmTransportFactory}"]
    environment:
      OZONE_OPTS:
  recon:
    <<: *common-config
    hostname: recon
    ports:
      - 9888:9888
    environment:
      OZONE_OPTS:
    command: ["/opt/hadoop/bin/ozone","recon"]
  scm:
    <<: *common-config
    hostname: scm
    ports:
      - 9876:9876
      - 9860:9860
    environment:
      ENSURE_SCM_INITIALIZED: /data/metadata/scm/current/VERSION
      OZONE-SITE.XML_hdds.scm.safemode.min.datanode: "${OZONE_SAFEMODE_MIN_DATANODES:-1}"
      OZONE_OPTS:
    command: ["/opt/hadoop/bin/ozone","scm"]
