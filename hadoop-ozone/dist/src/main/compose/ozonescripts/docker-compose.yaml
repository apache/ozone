x-common-config:
  &common-config
  build:
    context: .
    args:
      - OZONE_RUNNER_IMAGE
      - OZONE_RUNNER_VERSION
  env_file:
    - ./docker-config
  environment:
    OZONE_OPTS:
  volumes:
    - ../..:/opt/hadoop

services:
  datanode:
    <<: *common-config
    ports:
      - 19864
  om:
    <<: *common-config
    ports:
      - 9874:9874
      - 9862:9862
  scm:
    <<: *common-config
    ports:
      - 9876:9876
      - 9860:9860
