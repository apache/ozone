global:
  scrape_interval: 15s # By default, scrape targets every 15 seconds.
scrape_configs:
  - job_name: ozone
    metrics_path: /prom
    static_configs:
     - targets:
        - "scm1:9876"
        - "scm2:9876"
        - "scm3:9876"
       labels:
         component: scm
     - targets:
        - "om1:9874"
        - "om2:9874"
        - "om3:9874"
       labels:
         component: om
     - targets:
        - "s3g:19878"
       labels:
         component: s3g
     - targets: # During compose bring up the number of datanodes can be specific, adding 10 nodes to account for that.
        # Duplicate datanodes are specified here to account for compose v1 vs v2 differences.
        # compose v1
        - "ozone_datanode1_1:9882"
        - "ozone_datanode2_2:9882"
        - "ozone_datanode3_3:9882"
        # compose v2
        - "ozone-datanode1-1:9882"
        - "ozone-datanode2-1:9882"
        - "ozone-datanode3-1:9882"
       labels:
         component: datanode
