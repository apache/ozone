name=PropertiesConfig

# Checks for config change periodically and reloads
monitorInterval=30

# Uncomment following section to enable logging to console appender also
#appenders=console, rollingOMGC
#appender.console.type=Console
#appender.console.name=STDOUT
#appender.console.layout.type=PatternLayout
#appender.console.layout.pattern=%d{ISO8601} [%t] %p %c: %m%n

# Comment this line when using both console and rolling appenders
appenders=rollingOMGC

# Rolling File Appender with size thresholds only.
# Rolling is triggered when the log file size threshold is breached.
# The rolled over file is compressed by default
appender.rollingOMGC.type=RollingFile
appender.rollingOMGC.name=RollingOMGC
appender.rollingOMGC.fileName =${sys:hadoop.log.dir}/om-gc.log
appender.rollingOMGC.filePattern=${sys:hadoop.log.dir}/om-gc-%i.log.gz
appender.rollingOMGC.layout.type=PatternLayout
appender.rollingOMGC.layout.pattern=%d{ISO8601} [%t] %p %c: %m%n
appender.rollingOMGC.policies.type=Policies
appender.rollingOMGC.policies.size.type=SizeBasedTriggeringPolicy
appender.rollingOMGC.policies.size.size=256MB
appender.rollingOMGC.strategy.type=DefaultRolloverStrategy
appender.rollingOMGC.strategy.max=10

loggers=omgc
logger.omgc.name=OMGCLogger
logger.omgc.level=INFO
logger.omgc.appenderRefs=rollingOMGC
logger.omgc.appenderRef.rollingOMGC.ref=RollingOMGC

rootLogger.level=INFO
#rootLogger.appenderRefs=stdout
#rootLogger.appenderRef.stdout.ref=STDOUT
