name=PropertiesConfig

# Checks for config change periodically and reloads
monitorInterval=30

# Uncomment following section to enable logging to console appender also
#appenders=console, rollingOMGC
#appender.console.type=Console
#appender.console.name=STDOUT
#appender.console.layout.type=PatternLayout
#appender.console.layout.pattern=%d{ISO8601} [%t] %p %c: %m%n

# Comment this line when using both console and rolling appenders
appenders=rollingDeletion

# Rolling File Appender with size thresholds only.
# Rolling is triggered when the log file size threshold is breached.
# The rolled over file is compressed by default
appender.rollingDeletion.type=RollingFile
appender.rollingDeletion.name=RollingDeletion
appender.rollingDeletion.fileName =${sys:hadoop.log.dir}/om-deletion.log
appender.rollingDeletion.filePattern=${sys:hadoop.log.dir}/om-deletion-%i.log.gz
appender.rollingDeletion.layout.type=PatternLayout
appender.rollingDeletion.layout.pattern=%d{ISO8601} [%t] %p %c: %m%n
appender.rollingDeletion.policies.type=Policies
appender.rollingDeletion.policies.size.type=SizeBasedTriggeringPolicy
appender.rollingDeletion.policies.size.size=256MB
appender.rollingDeletion.strategy.type=DefaultRolloverStrategy
appender.rollingDeletion.strategy.max=10

loggers=omdeletion
logger.omdeletion.name=OMDeletionLogger
logger.omdeletion.level=INFO
logger.omdeletion.appenderRefs=rollingDeletion
logger.omdeletion.appenderRef.rollingDeletion.ref=RollingDeletion

rootLogger.level=INFO
#rootLogger.appenderRefs=stdout
#rootLogger.appenderRef.stdout.ref=STDOUT
