name: flaky-test-check
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git Ref (Branch/Commit_ID/Tag)
        default: master
        required: true
      test-class:
        description: Test Class
        default: NA
        required: true
      test-name:
        description: Test Name
        default:  ALL
        required: false
      submodule:
        description: Submodule
        default: 'ozone-integration-test'
        required: true
      iterations:
        description: Number of Iterations per split
        default: 10
        required: true
      splits:
        description: Number of splits
        default: 10
        required: true
      fail-fast:
        description: Stop after first failure
        default: false
        required: true
      ratis-repo:
        description: Ratis repository
        default: ''
        required: false
      ratis-ref:
        description: Ratis ref (branch, tag or commit SHA)
        default: ''
        required: false
      java-version:
        description: Java version to use
        default: '21'
        required: true
env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3
  TEST_CLASS: ${{ github.event.inputs.test-class}}
  TEST_METHOD: ${{ github.event.inputs.test-name }}
  ITERATIONS: ${{ github.event.inputs.iterations }}
  FAIL_FAST: ${{ github.event.inputs.fail-fast }}
  RATIS_REPO: ${{ github.event.inputs.ratis-repo }}
  RATIS_VERSION: ${{ github.event.inputs.ratis-ref }}
  JAVA_VERSION: ${{ github.event.inputs.java-version }}
  SPLITS: ${{ github.event.inputs.splits }}
  SUBMODULE: ${{ github.event.inputs.submodule }}
  # Surefire 3.0.0-M4 is used because newer versions do not reliably kill the fork on timeout
  # SUREFIRE-1722, SUREFIRE-1815
  SUREFIRE_VERSION: 3.0.0-M4
run-name: ${{ github.event_name == 'workflow_dispatch' && format('{0}#{1}[{2}]-{3}x{4}-java{5}', inputs.test-class, inputs.test-name, inputs.ref, inputs.splits, inputs.iterations, inputs.java-version) || '' }}
permissions: { }
jobs:
  prepare-job:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{steps.generate.outputs.matrix}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref }}
      - id: generate
        name: Generate test matrix
        run: |
          splits=()
          for ((i = 1; i <= $SPLITS; i++)); do
            splits+=("$i")
          done
          printf -v x "%s," "${splits[@]}"
          split_matrix="[${x%,}]"
          echo "matrix=$split_matrix" >> $GITHUB_OUTPUT
  ratis:
    uses: ./.github/workflows/build-ratis.yml
    if: ${{ github.event.inputs.ratis-ref != '' }}
    with:
      repo: ${{ github.event.inputs.ratis-repo || format('{0}/ratis', github.repository_owner) }}
      ref: ${{ github.event.inputs.ratis-ref }}
  build:
    if: ${{ !cancelled() }}
    needs:
      - prepare-job
      - ratis
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref }}
      - name: Cache for maven dependencies
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.m2/repository/*/*/*
            !~/.m2/repository/org/apache/ozone
          key: maven-repo-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-repo-
      - name: Download Ratis repo
        if: ${{ github.event.inputs.ratis-ref != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ratis-jars
          path: |
            ~/.m2/repository/org/apache/ratis
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java-version }}
      - name: Build (most) of Ozone
        run: |
          args="-DskipRecon -DskipShade -Dmaven.javadoc.skip=true -Drocks_tools_native"
          if [[ "$RATIS_VERSION" != "" ]]; then
            args="$args -Dratis.version=$ratis_version"
            args="$args -Dratis.thirdparty.version=$ratis_thirdparty_version"
            args="$args -Dratis-thirdparty.grpc.version=$grpc_version"
            args="$args -Dratis-thirdparty.netty.version=$netty_version"
            args="$args -Dratis-thirdparty.protobuf.version=$protobuf_version"
          fi

          args="$args -am -pl :$SUBMODULE"

          hadoop-ozone/dev-support/checks/build.sh $args
        env:
          ratis_version: ${{ needs.ratis.outputs.ratis-version }}
          ratis_thirdparty_version: ${{ needs.ratis.outputs.thirdparty-version }}
          grpc_version: ${{ needs.ratis.outputs.grpc-version }}
          netty_version: ${{ needs.ratis.outputs.netty-version }}
          protobuf_version: ${{ needs.ratis.outputs.protobuf-version }}
      - name: Store Maven repo for tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ozone-repo
          path: |
            ~/.m2/repository/org/apache/ozone
          retention-days: 1
  run-test:
    if: ${{ !cancelled() }}
    needs:
      - prepare-job
      - ratis
      - build
    name: Run-Split
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        split: ${{fromJson(needs.prepare-job.outputs.matrix)}}  # Define  splits
      fail-fast: ${{ fromJson(github.event.inputs.fail-fast) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref }}
      - name: Cache for maven dependencies
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.m2/repository/*/*/*
            !~/.m2/repository/org/apache/ozone
          key: maven-repo-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-repo-
      - name: Download Ratis repo
        if: ${{ github.event.inputs.ratis-ref != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ratis-jars
          path: |
            ~/.m2/repository/org/apache/ratis
      - name: Download Ozone repo
        id: download-ozone-repo
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ozone-repo
          path: |
            ~/.m2/repository/org/apache/ozone
        continue-on-error: true
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java-version }}
      - name: Execute tests
        run: |
          if [[ -e "$repo_path" ]]; then
            export OZONE_REPO_CACHED=true
          fi

          args="-DexcludedGroups=slow|unhealthy -DskipShade -Drocks_tools_native"
          if [[ "$RATIS_VERSION" != "" ]]; then
            args="$args -Dratis.version=$ratis_version"
            args="$args -Dratis.thirdparty.version=$ratis_thirdparty_version"
            args="$args -Dratis-thirdparty.grpc.version=$grpc_version"
            args="$args -Dratis-thirdparty.netty.version=$netty_version"
            args="$args -Dratis-thirdparty.protobuf.version=$protobuf_version"
          fi

          args="$args -pl :$SUBMODULE"

          if [ "$TEST_METHOD" = "ALL" ]; then
            echo "Running all tests from $TEST_CLASS"
            set -x
            hadoop-ozone/dev-support/checks/junit.sh $args -Dtest="$TEST_CLASS,Abstract*Test*\$*"
          else
            echo "Running test: $TEST_METHOD from $TEST_CLASS"
            set -x
            hadoop-ozone/dev-support/checks/junit.sh $args -Dtest="$TEST_CLASS#$TEST_METHOD,Abstract*Test*\$*"
          fi
        continue-on-error: true
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          repo_path: ${{ steps.download-ozone-repo.outputs.download-path }}
          ratis_version: ${{ needs.ratis.outputs.ratis-version }}
          ratis_thirdparty_version: ${{ needs.ratis.outputs.thirdparty-version }}
          grpc_version: ${{ needs.ratis.outputs.grpc-version }}
          netty_version: ${{ needs.ratis.outputs.netty-version }}
          protobuf_version: ${{ needs.ratis.outputs.protobuf-version }}
      - name: Summary of failures
        run: hadoop-ozone/dev-support/checks/_summary.sh target/unit/summary.txt
        if: ${{ !cancelled() }}
      - name: Archive build results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ failure() }}
        with:
          name: result-${{ github.run_number }}-${{ github.run_id }}-split-${{ matrix.split }}
          path: target/unit
  count-failures:
    if: ${{ failure() }}
    needs: run-test
    runs-on: ubuntu-slim
    steps:
      - name: Download build results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: Count failures
        run: |
          failures=$(find . -name 'summary.txt' | grep --text -v 'iteration' | xargs grep --text -v 'exit code: 0' | wc -l)
          echo "Total failures: $failures"
          if [[ $failures -gt 0 ]]; then
            echo ""
            echo "Failed runs:"
            grep --text 'exit code: 1' */summary.txt | grep --text -o 'split.*teration [0-9]*' | sed -e 's/.summary.txt:/ /' -e 's/-/ /' | sort -g -k2 -k4
            echo ""
            exit 1
          fi
