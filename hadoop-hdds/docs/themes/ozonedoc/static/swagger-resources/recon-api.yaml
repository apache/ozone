          example: 4f7a8b9c-1234-5678-9abc-def012345678
        state:
          type: string
          description: The unhealthy-container state being exported (MISSING, MIS_REPLICATED, UNDER_REPLICATED, OVER_REPLICATED).
          example: MISSING
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
          example: RUNNING
        submittedAt:
          type: integer
          description: Epoch millis when the job was submitted.
          example: 1718640123456
        startedAt:
          type: integer
          description: Epoch millis when the worker started the job. 0 while still queued.
          example: 1718640124000
        completedAt:
          type: integer
          description: Epoch millis when the job reached COMPLETED or FAILED. 0 while not yet terminal.
          example: 0
        totalRecords:
          type: integer
          description: Records written so far.
          example: 250
        estimatedTotal:
          type: integer
          description: Estimated total records for progress reporting. `-1` when unknown.
          example: 1000
        fileName:
          type: string
          description: Name of the export TAR file (no path). Empty until COMPLETED.
          example: unhealthy_MISSING_4f7a8b9c.tar
        errorMessage:
          type: string
          nullable: true
          description: Populated only when status is FAILED.
        progressPercent:
          type: integer
          description: Derived from totalRecords / estimatedTotal. 0 when estimatedTotal is unknown.
          example: 25
        queuePosition:
          type: integer
          description: 0 for jobs that are not QUEUED. Otherwise 1-based position in the queue.
          example: 0
        downloadCount:
          type: integer
          example: 0
        downloadsRemaining:
          type: integer
          example: 3
        maxDownloads:
          type: integer
          description: Maximum number of times this export can be downloaded.
          example: 3
        downloadAllowed:
          type: boolean
          description: Whether the export currently has at least one download remaining.
          example: true
