openapi: 3.0.0
info:
  title: Ozone Recon REST API
  version: v1
  license:
    url: http://www.apache.org/licenses/LICENSE-2.0.html
    name: Apache 2.0 License
servers:
  - url: /api/v1/
tags:
  - name: Containers
    description: APIs to fetch information about the available containers. **Admin Only**
  - name: Volumes
    description: APIs to fetch information about the available volumes. **Admin Only**
  - name: Buckets
    description: APIs to fetch information about the available buckets. **Admin Only**
  - name: Keys
    description: APIs to fetch information about the available keys. **Admin Only**
  - name: Containers and Keys
    description: APIs to fetch information about the available containers and keys. **Admin Only**
  - name: Blocks Metadata
    description: APIs to fetch metadata for the blocks available. **Admin Only**
  - name: Namespace Metadata
    description: APIs to fetch metadata for the namespace. **Admin Only**
  - name: Cluster State
    description: APIs to fetch data about the cluster state
  - name: Datanodes
    description: APIs to fetch data about the Datanodes
  - name: Pipelines
    description: APIs to fetch data about the Pipelines
  - name: Tasks
    description: APIs to fetch data about status of Recon Tasks
  - name: Utilization
    description: APIs to fetch data about space utilization
  - name: Metrics
    description: APIs to fetch data about various metrics from Prometheus
    externalDocs:
      description: Prometheus API docs
      url: https://prometheus.io/docs/prometheus/latest/querying/api/
  - name: Container Export
    description: Async export job lifecycle for unhealthy container metadata. **Admin Only**
  - name: Storage Distribution
    description: APIs to fetch data about storage distribution across datanodes. **Admin Only**
  - name: Pending Deletion
    description: APIs to fetch data about pending deletions by component (SCM, OM, or Datanodes). **Admin Only**
  - name: Heat Map
    description: APIs to fetch read-access heatmap data. **Admin Only**, feature-gated by HeatMapProvider service.
  - name: Features
    description: APIs to introspect Recon feature state. **Admin Only**
  - name: Admin Utilities
    description: Administrative actions such as triggering OM DB sync. **Admin Only**
paths:
  /containers:
    get:
      tags:
        - Containers
      summary: Get all Container Metadata information
      operationId: getContainerInfo
      parameters:
        - name: prevKey
          in: query
          description: |
            Returns containers with ID greater than the given prevKey (the prevKey container itself is
            skipped). Use 0 to start at the beginning.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          description: Maximum number of containers to return.
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerMetadata'
        '406':
          description: Invalid parameters (negative prevKey or limit).
  /containers/deleted:
    get:
      tags:
        - Containers
      summary: Return all DELETED containers in SCM
      operationId: getSCMDeletedContainers
      parameters:
        - name: limit
          in: query
          description: Maximum number of DELETED containers to return.
          required: false
          schema:
            type: integer
            default: 1000
        - name: prevKey
          in: query
          description: Previous container ID to skip. Use 0 to start at the beginning.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedContainers'
  /containers/missing:
    get:
      tags:
        - Containers
      summary: Get the MissingContainerMetadata for all missing containers
      description: Deprecated. Use `/containers/unhealthy/MISSING` instead.
      deprecated: true
      operationId: getMissingContainers
      parameters:
        - name: limit
          in: query
          description: Limit of the number of results returned
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissingContainerMetadata'
  /containers/quasiClosed:
    get:
      tags:
        - Containers
      summary: List containers in QUASI_CLOSED state, paginated by container ID.
      operationId: getQuasiClosedContainers
      parameters:
        - name: limit
          in: query
          description: Maximum number of containers to return.
          required: false
          schema:
            type: integer
            default: 1000
            minimum: 0
        - name: minContainerId
          in: query
          description: Cursor; return containers with ID greater than this value, in ascending order.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
            minimum: 0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuasiClosedContainersResponse'
        '400':
          description: '`limit` or `minContainerId` is negative.'
          content:
            text/plain:
              schema:
                type: string
  /containers/{id}/replicaHistory:
    get:
      tags:
        - Containers
      summary: Get all the Replica history for a given container id
      operationId: getReplicaHistoryForContainer
      parameters:
        - name: id
          in: path
          description: ID of the container for which we want ContainerHistory
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReplicaHistory'
  /containers/unhealthy:
    get:
      tags:
        - Containers
      summary: Get UnhealthyContainerMetadata for all the unhealthy containers
      operationId: getUnhealthyContainers
      parameters:
        - name: limit
          in: query
          description: Maximum number of unhealthy containers to return.
          required: false
          schema:
            type: integer
            default: 1000
        - name: maxContainerId
          in: query
          description: |
            Upper bound for container IDs to include (exclusive). When specified, returns containers
            with IDs less than this value in descending order. Use for backward pagination.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: minContainerId
          in: query
          description: |
            Lower bound for container IDs to include (exclusive). When `maxContainerId` is not specified,
            returns containers with IDs greater than this value in ascending order. Use for forward pagination.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnhealthyContainerMetadata'
  /containers/unhealthy/{state}:
    get:
      tags:
        - Containers
      summary: Returns UnhealthyContainerMetadata for all the unhealthy containers with the specified state
      operationId: getUnhealthyContainersWithState
      parameters:
        - name: state
          in: path
          description: State of the container which is one of **MISSING**, **MIS_REPLICATED**, **UNDER_REPLICATED**, **OVER_REPLICATED**
          required: true
          schema:
            type: string
            example: MISSING
        - name: limit
          in: query
          description: Maximum number of unhealthy containers to return.
          required: false
          schema:
            type: integer
            default: 1000
        - name: maxContainerId
          in: query
          description: |
            Upper bound for container IDs to include (exclusive). When specified, returns containers
            with IDs less than this value in descending order. Use for backward pagination.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: minContainerId
          in: query
          description: |
            Lower bound for container IDs to include (exclusive). When `maxContainerId` is not specified,
            returns containers with IDs greater than this value in ascending order. Use for forward pagination.
          required: false
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnhealthyContainerMetadata'
  /containers/unhealthy/export:
    get:
      tags:
        - Container Export
      summary: List all unhealthy-container export jobs (any status).
      operationId: listUnhealthyExportJobs
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExportJob'
    post:
      tags:
        - Container Export
      summary: Start an async CSV export job for unhealthy containers in the given state.
      operationId: startUnhealthyExport
      parameters:
        - name: state
          in: query
          required: true
          description: One of **MISSING**, **MIS_REPLICATED**, **UNDER_REPLICATED**, **OVER_REPLICATED**.
          schema:
            type: string
      responses:
        '200':
          description: Job submitted; returns the ExportJob with assigned jobId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '400':
          description: Missing or invalid state parameter.
        '429':
          description: Too many concurrent export jobs; try again later.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitedError'
  /containers/unhealthy/export/{jobId}:
    get:
      tags:
        - Container Export
      summary: Get the current status of an export job.
      operationId: getUnhealthyExportStatus
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job found; returns the ExportJob with current status and progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '404':
          description: Job not found.
    delete:
      tags:
        - Container Export
      summary: Cancel a queued or running export job.
      operationId: cancelUnhealthyExport
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancel request accepted (empty body).
        '404':
          description: Job not found or already in a terminal state.
  /containers/unhealthy/export/{jobId}/download:
    get:
      tags:
        - Container Export
      summary: Download the TAR archive for a completed export job.
      operationId: downloadUnhealthyExport
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: TAR archive stream. Content-Disposition includes the export filename.
          content:
            application/x-tar:
              schema:
                type: string
                format: binary
        '404':
          description: Job or export file not found.
        '409':
          description: Job has not reached COMPLETED status yet.
        '429':
          description: Maximum download limit for this job has been reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadLimitReachedError'
  /containers/mismatch:
    get:
      tags:
        - Containers
      summary: Returns the list of mis-matched containers between OM and SCM
      operationId: getContainerMisMatchInsights
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
        - name: missingIn
          in: query
          description: Filters by where a given container is missing i.e. in OM or SCM
          required: false
          schema:
            type: string
            default: SCM
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MismatchedContainers'
  /containers/mismatch/deleted:
    get:
      tags:
        - Containers
      summary: Returns the list of DELETED containers in SCM that are present in OM
      operationId: getOmContainersDeletedInSCM
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedMismatchedContainers'
  /volumes:
    get:
      tags:
        - Volumes
      summary: Returns the set of all volumes present
      operationId: getVolumes
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volumes'
  /buckets:
    get:
      tags:
        - Buckets
      summary: Returns the set of all buckets across all volumes
      operationId: getBuckets
      parameters:
        - name: volume
          in: query
          description: Stores the name of the volumes whose buckets to fetch
          required: false
          schema:
            type: string
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Buckets'
  /keys/open:
    get:
      tags:
        - Keys
      summary: Returns the set of keys/files which are open
      operationId: getOpenKeyInfo
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
        - name: startPrefix
          in: query
          description: Will return keys matching this prefix. Must be at bucket level or deeper (e.g. /vol1/bucket1[/...]).
          required: false
          schema:
            type: string
        - name: includeFso
          in: query
          description: Boolean value to determine whether to include FSO keys or not
          required: false
          schema:
            type: boolean
            default: false
        - name: includeNonFso
          in: query
          description: Boolean value to determine whether to include non-FSO keys or not
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenKeys'
  /keys/open/summary:
    get:
      tags:
        - Keys
      summary: Returns the summary of all open keys info
      operationId: getOpenKeySummary
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenKeysSummary'
  /keys/open/mpu/summary:
    get:
      tags:
        - Keys
      summary: Returns the summary of all open multipart-upload keys
      operationId: getOpenMPUKeySummary
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenMPUKeysSummary'

  /keys/deletePending:
    get:
      tags:
        - Keys
      summary: Returns the set of keys/files which are pending for deletion
      operationId: getDeletedKeyInfo
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
        - name: startPrefix
          in: query
          description: Will return keys matching this prefix
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePendingKeys'
  /keys/deletePending/dirs:
    get:
      tags:
        - Keys
      summary: Returns the set of keys/files which are pending for deletion
      operationId: getDeletedDirInfo
      parameters:
        - name: prevKey
          in: query
          description: Stores the previous key after which to fetch the data.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePendingDirs'
  /keys/deletePending/summary:
    get:
      tags:
        - Keys
      summary: Returns the summary of all keys pending deletion info
      operationId: getDeletedKeySummary
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePendingSummary'
  /keys/deletePending/dirs/summary:
    get:
      tags:
        - Keys
      summary: Retrieves the summary of deleted directories.
      operationId: getDeletedDirectorySummary
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalDeletedDirectories:
                    type: integer
  /keys/listKeys:
    get:
      tags:
        - Keys
      summary: List committed keys under a prefix with optional filters.
      operationId: listKeys
      parameters:
        - name: startPrefix
          in: query
          required: false
          description: |
            Bucket-level or deeper prefix (e.g. `/vol1/bucket1` or `/vol1/bucket1/dir1`).
            HTTP-level the parameter is optional (defaults to `/`), but the handler rejects
            anything shallower than bucket level with `400 Bad Request`, so in practice
            callers must supply one.
          schema:
            type: string
            default: /
        - name: replicationType
          in: query
          required: false
          description: Filter by replication type (e.g. `RATIS`, `EC`).
          schema:
            type: string
        - name: creationDate
          in: query
          required: false
          description: Filter by creation date (only keys created on or after this date are returned).
          schema:
            type: string
        - name: keySize
          in: query
          required: false
          description: Filter to keys with data size at least this many bytes.
          schema:
            type: integer
            default: 0
        - name: prevKey
          in: query
          required: false
          description: Pagination cursor. Pass back the `lastKey` from the previous response.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of keys to return.
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKeysResponse'
        '204':
          description: No keys matched the given filters.
        '400':
          description: Missing or shallower-than-bucket `startPrefix`.
        '503':
          description: Recon is still bootstrapping OM DB; retry later. Response status is `INITIALIZING`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKeysResponse'
  /containers/{id}/keys:
    get:
      tags:
        - Containers and Keys
      summary: Get the Key metadata for all keys present in the given container ID
      operationId: getKeysForContainer
      parameters:
        - name: id
          in: path
          description: ID of the container for which we want Key Metadata
          required: true
          schema:
            type: integer
        - name: prevKey
          in: query
          description: Only return keys that are present after the given key prevKey prefix
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Limit of the number of results returned
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyMetadata'
  /blocks/deletePending:
    get:
      tags:
        - Blocks Metadata
      summary: Fetch the list of blocks pending for deletion
      operationId: getBlocksPendingDeletion
      parameters:
        - name: prevKey
          in: query
          description: Only returns the list of blocks pending for deletion, that are present after the given block id (prevKey).
          example: 4
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Stores the limit for the number of results to fetch
          required: false
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePendingBlocks'
  /namespace/summary:
    get:
      tags:
        - Namespace Metadata
      summary: Returns a basic summary of the path, including entity type and aggregate count of objects under the path.
      operationId: getBasicInfo
      parameters:
        - name: path
          in: query
          description: The path request in string without any protocol prefix.
          example: /volume1/bucket1
          required: true
          schema:
            type: string
      responses:
        '200':
          description: |
            Successful operation<br>
            #### **Note**:
            #### status can be either **OK** if path exists else **PATH_NOT_FOUND**
            #### If **any num parameter is -1**, the path request is not applicable to such an entity type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceMetadataResponse'
  /namespace/usage:
    get:
      tags:
        - Namespace Metadata
      summary: Returns namespace usage of all sub-paths under the path.
      operationId: getDiskUsage
      parameters:
        - name: path
          in: query
          description: The path request in string without any protocol prefix.
          example: /volume1/bucket1
          required: true
          schema:
            type: string
        - name: files
          in: query
          description: This boolean has a default value of false. When set to true, it calculates the namespace usage for keys within the specified path and also provides a list of their corresponding sub-paths.
          example: true
          required: false
          schema:
            type: boolean
        - name: replica
          in: query
          description: A boolean with a default value of false. If set to true, computes namespace usage with replicated size of keys.
          example: true
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: |
            Successful operation<br>
            #### **Note**:
            #### The below example response is for the sample endpoint: **namespace/usage?path=/vol1/bucket1&files=true&replica=true**
            #### status can be either **OK** if path exists else **PATH_NOT_FOUND**
            #### If files is set to **false**, sub-path **/vol1/bucket1/key1-1 is omitted**.
            #### If replica is set to **false**, **sizeWithReplica returns -1**.
            #### If the path’s entity type cannot have direct keys (Root, Volume), sizeDirectKey returns -1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataDiskUsage'
  /namespace/quota:
    get:
      tags:
        - Namespace Metadata
      summary: Returns the quota allowed and used under the path. Only volumes and buckets have quota. Other types are not applicable to the quota request.
      operationId: getQuotaUsage
      parameters:
        - name: path
          in: query
          description: The path request in string without any protocol prefix.
          example: /volume1/bucket1
          required: true
          schema:
            type: string
      responses:
        '200':
          description: |
            Successful operation<br>
            #### **Note**:
            #### status can be either **OK** if path exists else **PATH_NOT_FOUND**, **TYPE_NOT_APPLICABLE** if path exists, but the path’s entity type is not applicable to the request.
            #### If **quota is not set, "allowed" returns -1**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataQuota'
  /namespace/dist:
    get:
      tags:
        - Namespace Metadata
      summary: Returns the file size distribution of all keys under the path.
      operationId: getFileSizeDistribution
      parameters:
        - name: path
          in: query
          description: The path request in string without any protocol prefix.
          example: /
          required: true
          schema:
            type: string
      responses:
        '200':
          description: |
            Successful operation<br>
            #### **Note**:
            #### status can be either **OK** if path exists else **PATH_NOT_FOUND**, **TYPE_NOT_APPLICABLE** if path exists, but the path is a key, which does not have a file size distribution.
            #### Recon keeps track of all keys with size from **1 KB to 1 PB**.
            #### For keys **smaller than 1 KB, map to the first bin (index)**, for **keys larger than 1 PB, map to the last bin (index)**.
            #### Each **index of dist** is mapped to a file size range (e.g. **1 MB - 2 MB**).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataSpaceDist'
  /clusterState:
    get:
      tags:
        - Cluster State
      summary: Returns the summary of the current state of the Ozone cluster.
      operationId: getClusterState
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterState'
  /datanodes:
    get:
      tags:
        - Datanodes
      summary: Returns all the datanodes in the cluster.
      operationId: getDatanodes
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatanodesSummary'
  /datanodes/decommission/info:
    get:
      tags:
        - Datanodes
      summary: Returns all the datanodes in the decommissioning state
      operationId: getDecommissioningDatanodes
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatanodesDecommissionInfo'
  /datanodes/decommission/info/datanode:
    get:
      tags:
        - Datanodes
      summary: Returns info of a specific datanode for which decommissioning is initiated
      operationId: getDecommissionInfoForDatanode
      parameters:
        - name: uuid
          in: query
          description: The uuid of the datanode being decommissioned.
          required: false
          schema:
            type: string
        - name: ipAddress
          in: query
          description: The ipAddress of the datanode being decommissioned.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatanodesDecommissionInfo'
  /datanodes/remove:
    put:
      tags:
        - Datanodes
      summary: Removes datanodes from Recon's memory and nodes table in Recon DB.
      operationId: removeDatanodes
      requestBody:
        description: List of datanodes to be removed
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemovedDatanodesResponse'

  /pipelines:
    get:
      tags:
        - Pipelines
      summary: Returns all the pipelines in the cluster.
      operationId: getPipelines
      responses:
        '200':
          description: |
            Successful Operation<br>
            #### **Note**: The following sample response shows only one pipeline in the array
            #### but since the pipeline totalCount is 5, there are 4 more pipelines expected in the array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelinesSummary'
  /task/status:
    get:
      tags:
        - Tasks
      summary: Returns the status of all the Recon tasks.
      operationId: getTaskTimes
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksStatus'
  /utilization/fileCount:
    get:
      tags:
        - Utilization
      summary: Returns the file counts within different file ranges with fileSize in the response object being the upper cap for file size range.
      operationId: getFileCounts
      parameters:
        - name: volume
          in: query
          description: Filters the results based on the given volume name.
          example: sampleVol
          required: false
          schema:
            type: string
        - name: bucket
          in: query
          description: Filters the results based on the given bucket name.
          example: sampleBucket
          required: false
          schema:
            type: string
        - name: fileSize
          in: query
          description: |
            Filters the results based on the given file size.<br>
            The smallest file size being tracked for count is 1 KB i.e. 1024 bytes.
          example: 1024
          required: false
          schema:
            type: number
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSizeUtilization'
  /utilization/containerCount:
    get:
      tags:
        - Utilization
      summary: Returns the container counts within the given container size.
      operationId: getContainerCounts
      parameters:
        - name: containerSize
          in: query
          description: |
            Filters the results based on the given containerSize.<br>
            The smallest container size being tracked for count is 512 MB i.e. 512000000 bytes.
          example: 512000000
          required: false
          schema:
            type: number
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerUtilization'
  /metrics/{api}:
    get:
      tags:
        - Metrics
      summary: This is a proxy endpoint for Prometheus, and helps to fetch different metrics for Ozone
      operationId: getMetricsResponse
      parameters:
        - name: api
          in: path
          required: true
          description: |
            The Prometheus HTTP API endpoint to invoke (for example `query` or `query_range`).
            On the Java side the segment falls back to `query` when absent, but in OpenAPI a path
            parameter is always required, so callers must pass a value.
          schema:
            type: string
        - name: query
          in: query
          description: The query in a Prometheus query format for which to fetch results
          example: ratis_leader_election_electionCount
          required: true
          schema:
            type: string
          allowReserved: true
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsQuery'
  /heatmap/readaccess:
    get:
      tags:
        - Heat Map
      summary: Returns the top-N prefixes by read access as a tree of `EntityReadAccessHeatMap` nodes
      operationId: getReadAccessHeatMap
      description: |
        Heatmap responses are feature-gated. If the HeatMap feature is disabled (see
        `/features/disabledFeatures`), this route returns **404 Not Found**.
      parameters:
        - name: startDate
          in: query
          required: false
          description: Look-back window for access aggregation. Default `24H`.
          schema:
            type: string
            default: "24H"
        - name: entityType
          in: query
          required: false
          description: Entity granularity. Default `key`.
          schema:
            type: string
            default: key
        - name: path
          in: query
          required: false
          description: Restrict heatmap to this path prefix.
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityReadAccessHeatMap'
        '404':
          description: HeatMap feature is disabled.
        '500':
          description: HeatMap provider failure.
  /heatmap/healthCheck:
    get:
      tags:
        - Heat Map
      summary: Health check for the configured HeatMap provider
      operationId: getHeatMapHealthCheck
      responses:
        '200':
          description: Health check result. Body depends on the provider implementation.
          content:
            application/json:
              schema:
                type: object
  /features/disabledFeatures:
    get:
      tags:
        - Features
      summary: Lists Recon features that are currently disabled
      operationId: getDisabledFeatures
      description: |
        Returned strings match the enum constant names from `FeatureProvider.Feature`
        (currently the only candidate is `HEATMAP`).
      responses:
        '200':
          description: Array of disabled feature names (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - HEATMAP
  /triggerdbsync/om:
    get:
      tags:
        - Admin Utilities
      summary: Triggers an immediate OM DB sync from Recon
      operationId: triggerOMDBSync
      responses:
        '200':
          description: Boolean indicating whether the sync request was accepted.
          content:
            application/json:
              schema:
                type: boolean
                example: true
  /triggerdbsync/scm/snapshot:
    post:
      tags:
        - Admin Utilities
      summary: Trigger an SCM DB snapshot sync from SCM to Recon.
      description: |
        Starts a one-shot SCM DB snapshot sync in the background. Idempotent: if a sync is
        already in progress the request is rejected with **409 Conflict**. The response body
        carries the current `ScmDbSnapshotSyncStatus` so the caller can distinguish "accepted
        and started" from "rejected because another sync is running".
      operationId: triggerSCMDBSnapshotSync
      responses:
        '202':
          description: Sync accepted and started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScmDbSnapshotTriggerResponse'
        '409':
          description: Another SCM DB sync is already running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScmDbSnapshotTriggerResponse'
  /triggerdbsync/scm/snapshot/status:
    get:
      tags:
        - Admin Utilities
      summary: Get the current status of an SCM DB snapshot sync.
      operationId: getSCMDBSnapshotSyncStatus
      responses:
        '200':
          description: Current status (always returned, even when no sync is running).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScmDbSnapshotStatusResponse'
  /triggerdbsync/scm/snapshot/cancel:
    post:
      tags:
        - Admin Utilities
      summary: Cancel an in-progress SCM DB snapshot sync.
      description: |
        Cancellation is only honored while the sync is `IN_PROGRESS` and still in a cancellable
        phase (before `INITIALIZING_DB`). The response body's `cancelled` flag indicates whether
        the cancel actually took effect.
      operationId: cancelSCMDBSnapshotSync
      responses:
        '200':
          description: Cancellation accepted; the sync has been cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScmDbSnapshotCancelResponse'
        '409':
          description: No sync is running, or the sync has passed the cancellable phase.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScmDbSnapshotCancelResponse'
  /storageDistribution:
    get:
      tags:
        - Storage Distribution
      summary: Retrieves storage capacity distribution across datanodes including global storage, namespace, and used space breakdown
      operationId: getStorageDistribution
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageCapacityDistributionResponse'
        '500':
          description: Internal server error while retrieving storage distribution
          content:
            text/plain:
              schema:
                type: string
  /pendingDeletion:
    get:
      tags:
        - Pending Deletion
      summary: Returns pending deletion information for the specified component (scm, om, or dn)
      operationId: getPendingDeletionByComponent
      description: |
        Returns pending deletion data for a specific component:
        - **scm**: Returns block-level pending deletion stats from the Storage Container Manager.
        - **om**: Returns a map of pending deletion sizes (pendingDirectorySize, pendingKeySize) from the Object Manager.
        - **dn**: Triggers or polls a background metrics collection task across all datanodes. Returns **HTTP 202** if collection is in progress, or **HTTP 200** with per-datanode pending block sizes if finished.
      parameters:
        - name: component
          in: query
          description: Component to query. One of `scm`, `om`, or `dn`.
          example: scm
          required: true
          schema:
            type: string
            enum:
              - scm
              - om
              - dn
        - name: limit
          in: query
          description: Maximum number of datanode results to return (only applicable when component=dn).
          example: 10
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: |
            Successful Operation. Response schema depends on the `component` parameter:
            - **scm**: `ScmPendingDeletion`
            - **om**: `OmPendingDeletion`
            - **dn**: `DataNodeMetricsServiceResponse` (only when collection is FINISHED)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ScmPendingDeletion'
                  - $ref: '#/components/schemas/OmPendingDeletion'
                  - $ref: '#/components/schemas/DataNodeMetricsServiceResponse'
        '202':
          description: Datanode metrics collection is still in progress or not yet started (only for component=dn).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataNodeMetricsServiceResponse'
        '204':
          description: No SCM pending-deletion summary available (only for component=scm).
        '400':
          description: |
            Missing/invalid `component` (must be one of `scm`, `om`, `dn`), or `limit` is less than 1 when `component=dn`.
          content:
            text/plain:
              schema:
                type: string
  /storageDistribution/download:
    get:
      tags:
        - Storage Distribution
      summary: Downloads per-datanode storage and pending deletion statistics as a CSV file
      operationId: downloadDataNodeStorageDistribution
      description: |
        Triggers or polls a background metrics collection task across all datanodes.
        - If collection is **not yet finished**, returns **HTTP 202** with a JSON status response.
        - If collection is **finished**, returns **HTTP 200** with a downloadable CSV file containing
          per-datanode stats: HostName, Datanode UUID, Filesystem Capacity, Filesystem Used Space,
          Filesystem Remaining Space, Ozone Capacity, Ozone Used Space, Ozone Remaining Space,
          PreAllocated Container Space, Reserved Space, Minimum Free Space, Pending Block Size.
      responses:
        '200':
          description: CSV file with storage and pending deletion statistics per datanode
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '202':
          description: Metrics collection is still in progress or has not started; returns current collection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataNodeMetricsServiceResponse'
        '500':
          description: Internal server error, metrics data missing despite FINISHED collection status
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Volumes:
      type: object
      properties:
        totalCount:
          type: integer
        volumes:
          type: array
          items:
            type: object
            properties:
              metadata:
                type: object
              name:
                type: string
              quotaInBytes:
                type: integer
              quotaInNamespace:
                type: integer
              usedNamespace:
                type: integer
              creationTime:
                type: integer
              modificationTime:
                type: integer
              acls:
                $ref: "#/components/schemas/ACL"
              admin:
                type: string
              owner:
                type: string
              volume:
                type: string
    Buckets:
      type: object
      properties:
        totalCount:
          type: integer
        buckets:
          type: array
          items:
            type: object
            properties:
              versioningEnabled:
                type: boolean
              metadata:
                type: object
              name:
                type: string
              quotaInBytes:
                type: integer
              quotaInNamespace:
                type: integer
              usedNamespace:
                type: integer
              creationTime:
                type: integer
              modificationTime:
                type: integer
              acls:
                $ref: "#/components/schemas/ACL"
              volumeName:
                type: string
              storageType:
                type: string
              versioning:
                type: boolean
              usedBytes:
                type: integer
              encryptionInfo:
                type: object
                properties:
                  version:
                    type: string
                  suite:
                    type: string
                  keyName:
                    type: string
              replicationConfigInfo:
                type: object
                nullable: true
              sourceVolume:
                type: string
                nullable: true
              sourceBucket:
                type: string
                nullable: true
              bucketLayout:
                type: string
              owner:
                type: string
    ContainerMetadata:
      type: object
      properties:
        data:
          type: object
          properties:
            totalCount:
              type: integer
              example: 3
            prevKey:
              type: integer
              example: 3019
            containers:
              type: array
              items:
                type: object
                properties:
                  ContainerID:
                    type: integer
                    example: 1
                  NumberOfKeys:
                    type: integer
                    example: 834
                  pipelines:
                    type: string
                    nullable: true
                xml:
                  name: containerMetadata
              example:
                - ContainerID: 1
                  NumberOfKeys: 834
                  pipelines: null
                - ContainerID: 2
                  NumberOfKeys: 833
                  pipelines: null
                - ContainerID: 3
                  NumberOfKeys: 833
                  pipelines: null
      xml:
        name: containerMetadataResponse
    DeletedContainers:
      type: array
      items:
        type: object
        properties:
          containerId:
            type: integer
          pipelineID:
            type: object
            properties:
              id:
                type: string
          containerState:
            type: string
          stateEnterTime:
            type: integer
          lastUsed:
            type: integer
          replicationConfig:
            type: object
            properties:
              replicationType:
                type: string
              replicationFactor:
                type: string
              replicationNodes:
                type: integer
          replicationFactor:
            type: string
    KeyMetadata:
      type: object
      properties:
        totalCount:
          type: integer
          example: 7
        lastKey:
          type: string
          example: /vol1/buck1/file1
        keys:
          type: array
          items:
            type: object
            properties:
              Volume:
                type: string
                example: vol-1-73141
              Bucket:
                type: string
                example: bucket-3-35816
              Key:
                type: string
                example: key-0-43637
              CompletePath:
                type: string
                example: /vol1/buck1/dir1/dir2/file1
              DataSize:
                type: integer
                example: 1000
              Versions:
                type: array
                items:
                  type: integer
                example: [0]
              Blocks:
                type: object
                properties:
                  0:
                    type: array
                    items:
                      type: object
                      properties:
                        containerID:
                          type: integer
                        localID:
                          type: number
                    example:
                      - containerID: 1
                        localID: 105232659753992201
              CreationTime:
                type: string
                format: date-time
                example: 2020-11-18T18:09:17.722Z
              ModificationTime:
                type: string
                format: date-time
                example: 2020-11-18T18:09:30.405Z
    ReplicaHistory:
      type: object
      properties:
        containerID:
          type: integer
          example: 1
        datanodeUuid:
          type: string
          example: 841be80f-0454-47df-b676
        datanodeHost:
          type: string
          example: localhost-1
        firstSeenTime:
          type: number
          example: 1605724047057
        lastSeenTime:
          type: number
          example: 1605731201301
        lastBcsId:
          type: integer
          example: 123
        state:
          type: string
          example: OPEN
    MissingContainerMetadata:
      type: object
      properties:
        totalCount:
          type: integer
          example: 26
        containers:
          type: array
          items:
            type: object
            properties:
              containerID:
                type: integer
                example: 1
              missingSince:
                type: number
                example: 1605731029145
              keys:
                type: integer
                example: 7
              pipelineID:
                type: string
                example: 88646d32-a1aa-4e1a
              replicas:
                type: array
                items:
                  $ref: "#/components/schemas/ReplicaHistory"
    UnhealthyContainerMetadata:
      type: object
      properties:
        missingCount:
          type: integer
          example: 2
        underReplicatedCount:
          type: integer
          example: 0
        overReplicatedCount:
          type: integer
          example: 0
        misReplicatedCount:
          type: integer
          example: 0
        replicaMismatchCount:
          type: integer
          example: 0
        firstKey:
          type: integer
          description: Smallest container ID present in this page. Use with `maxContainerId` for backward pagination.
          example: 1
        lastKey:
          type: integer
          description: Largest container ID present in this page. Use as `minContainerId` for the next forward page.
          example: 42
        containers:
          type: array
          items:
            type: object
            properties:
              containerID:
                type: integer
                example: 1
              containerState:
                type: string
                example: MISSING
              unhealthySince:
                type: number
                example: 1605731029145
              expectedReplicaCount:
                type: integer
                example: 3
              actualReplicaCount:
                type: integer
                example: 0
              replicaDeltaCount:
                type: integer
                example: 3
              reason:
                type: string
                example: null
              keys:
                type: integer
                example: 7
              pipelineID:
                type: string
                example: 88646d32-a1aa-4e1a
              replicas:
                type: array
                items:
                  $ref: "#/components/schemas/ReplicaHistory"
    QuasiClosedContainerMetadata:
      type: object
      properties:
        containerID:
          type: integer
          format: int64
          example: 42
        pipelineID:
          type: string
          nullable: true
          example: 88646d32-a1aa-4e1a-a8d5-aa1e7dd3f5cc
        keys:
          type: integer
          format: int64
          example: 17
        stateEnterTime:
          type: integer
          format: int64
          description: Epoch millis when the container entered QUASI_CLOSED per SCM.
          example: 1718640123456
        expectedReplicaCount:
          type: integer
          format: int64
          example: 3
        actualReplicaCount:
          type: integer
          format: int64
          example: 2
        replicas:
          type: array
          items:
            $ref: '#/components/schemas/ReplicaHistory'
    QuasiClosedContainersResponse:
      type: object
      properties:
        quasiClosedCount:
          type: integer
          format: int64
          description: Total number of containers in QUASI_CLOSED state across the cluster.
          example: 42
        firstKey:
          type: integer
          format: int64
          description: Container ID of the first item in `containers`; equals `minContainerId` when the page is empty.
          example: 100
        lastKey:
          type: integer
          format: int64
          description: Container ID of the last item in `containers`; pass as `minContainerId` to fetch the next page.
          example: 199
        containers:
          type: array
          items:
            $ref: '#/components/schemas/QuasiClosedContainerMetadata'
    MismatchedContainers:
      type: object
      properties:
        lastKey:
          type: integer
          example: 21
        containerDiscrepancyInfo:
          type: array
          items:
            type: object
            properties:
              containerId:
                type: integer
                example: 11
              numberOfKeys:
                type: integer
                example: 1
              pipelines:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 1202e6bb-b7c1-4a85-8067-61374b069adb
                    replicationConfig:
                      type: object
                      properties:
                        replicationFactor:
                          type: string
                          example: THREE
                        requiredNodes:
                          type: integer
                          example: 3
                        replicationType:
                          type: string
                          example: RATIS
                    healthy:
                      type: boolean
                      example: true
              existsAt:
                type: string
                example: OM
          example:
            - containerId: 2
              numberOfKeys: 2
              pipelines:
                - id:
                    id: 1202e6bb-b7c1-4a85-8067-61374b069adb
                  replicationConfig:
                    replicationFactor: ONE
                    requiredNodes: 1
                    replicationType: RATIS
                  healthy: true
              existsAt: OM
            - containerId: 11
              numberOfKeys: 2
              pipelines:
                - id:
                    id: 1202e6bb-b7c1-4a85-8067-61374b069adb
                  replicationConfig:
                    replicationFactor: TWO
                    requiredNodes: 2
                    replicationType: RATIS
                  healthy: true
                - id:
                    id: 1202e6bb-b7c1-4a85-8067-613724nn
                  replicationConfig:
                    replicationFactor: ONE
                    requiredNodes: 1
                    replicationType: RATIS
                  healthy: true
              existsAt: SCM
    DeletedMismatchedContainers:
      type: object
      properties:
        lastKey:
          type: integer
          example: 21
        containerDiscrepancyInfo:
          type: array
          items:
            type: object
            properties:
              containerId:
                type: integer
                example: 11
              numberOfKeys:
                type: integer
                example: 1
              pipelines:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 1202e6bb-b7c1-4a85-8067-61374b069adb
                    replicationConfig:
                      type: object
                      properties:
                        replicationFactor:
                          type: string
                          example: THREE
                        requiredNodes:
                          type: integer
                          example: 3
                        replicationType:
                          type: string
                          example: RATIS
                    healthy:
                      type: boolean
                      example: true
              existsAt:
                type: string
                example: OM
          example:
            - containerId: 2
              numberOfKeys: 2
              pipelines:
                - id:
                    id: 1202e6bb-b7c1-4a85-8067-61374b069adb
                  replicationConfig:
                    replicationFactor: ONE
                    requiredNodes: 1
                    replicationType: RATIS
                  healthy: true
