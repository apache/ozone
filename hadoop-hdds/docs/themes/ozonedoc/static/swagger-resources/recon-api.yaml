    GlobalStorageReport:
      type: object
      description: |
        Aggregated storage metrics across all datanodes in the cluster.

        **Storage Hierarchy:**
        - `totalFileSystemCapacity` = `totalOzoneCapacity` + `totalReservedSpace`
        - `totalOzoneCapacity` = `totalOzoneUsedSpace` + `totalOzoneFreeSpace`
      properties:
        totalFileSystemCapacity:
          type: integer
          format: int64
          description: Total OS-reported filesystem capacity across all datanodes (bytes)
          example: 270461374464
        totalReservedSpace:
          type: integer
          format: int64
          description: Space reserved and not available for Ozone allocation (bytes)
          example: 31457280
        totalOzoneCapacity:
          type: integer
          format: int64
          description: Portion of filesystem capacity available for Ozone, equal to filesystem capacity minus reserved space (bytes)
          example: 270429917184
        totalOzoneUsedSpace:
          type: integer
          format: int64
          description: Space currently consumed by Ozone data (bytes)
          example: 358805504
        totalOzoneFreeSpace:
          type: integer
          format: int64
          description: Remaining allocatable space within Ozone capacity (bytes)
          example: 270071111680
        totalOzoneCommittedSpace:
          type: integer
          format: int64
          description: Space pre-allocated for containers but not yet fully utilized (bytes)
          example: 27007111
        totalMinimumFreeSpace:
          type: integer
          format: int64
          description: Minimum free space that must be maintained as per configuration (bytes)
          example: 20480
    GlobalNamespaceReport:
      type: object
      description: High-level metadata summary of the global namespace
      properties:
        totalUsedSpace:
          type: integer
          format: int64
          description: |
            Total space utilized in the namespace (bytes). Includes committed data,
            open keys, and data pending deletion.
          example: 500000000
        totalKeys:
          type: integer
          format: int64
          description: Total number of keys (files) in the namespace across all volumes and buckets
          example: 10000
    UsedSpaceBreakDown:
      type: object
      description: Breakdown of used storage space by lifecycle category
      properties:
        openKeyBytes:
          $ref: '#/components/schemas/OpenKeyBytesInfo'
        finalizedKeyBytes:
          type: integer
          format: int64
          description: Space occupied by written (closed) keys with replica overhead (bytes)
          example: 450000000
    OpenKeyBytesInfo:
      type: object
      description: Breakdown of storage space occupied by open (uncommitted) keys
      properties:
        openKeyAndFileBytes:
          type: integer
          format: int64
          description: Total replicated bytes for open non-multipart keys and files
          example: 13824
        multipartOpenKeyBytes:
          type: integer
          format: int64
          description: Total replicated bytes for in-progress multipart upload keys
          example: 4096
        totalOpenKeyBytes:
          type: integer
          format: int64
          description: Sum of openKeyAndFileBytes and multipartOpenKeyBytes
          example: 17920
    DataNodeMetricsServiceResponse:
      type: object
      description: Response from a background per-datanode metrics collection task
      properties:
        status:
          type: string
          enum:
            - NOT_STARTED
            - IN_PROGRESS
            - FINISHED
            - FAILED
          description: Current status of the metric collection task
          example: FINISHED
        totalPendingDeletionSize:
          type: integer
          format: int64
          description: Total size of blocks pending deletion across all queried datanodes (bytes)
          example: 1048576
        pendingDeletionPerDataNode:
          type: array
          nullable: true
          description: Per-datanode pending deletion metrics; null if collection is not finished
          items:
            $ref: '#/components/schemas/DatanodePendingDeletionMetrics'
        totalNodesQueried:
          type: integer
          description: Total number of datanodes queried during the collection task
          example: 4
        totalNodeQueriesFailed:
          type: integer
          format: int64
          description: Number of datanode queries that failed during collection
          example: 0
    DatanodePendingDeletionMetrics:
      type: object
      description: Pending deletion block metrics for a single datanode
      properties:
        hostName:
          type: string
          description: Hostname of the datanode
          example: ozone-datanode-1
        datanodeUuid:
          type: string
          description: UUID of the datanode
          example: 841be80f-0454-47df-b676-a1234567890a
        pendingBlockSize:
          type: integer
          format: int64
          description: Total size of blocks pending deletion on this datanode (bytes)
          example: 262144
    ScmPendingDeletion:
      type: object
      description: Block-level pending deletion statistics from the Storage Container Manager
      properties:
        totalBlocksize:
          type: integer
          format: int64
          description: Total unreplicated size of all blocks pending deletion in SCM (bytes)
          example: 10485760
        totalReplicatedBlockSize:
          type: integer
          format: int64
          description: Total replicated size of all blocks pending deletion in SCM (bytes)
          example: 31457280
        totalBlocksCount:
          type: integer
          format: int64
          description: Total number of blocks pending deletion in SCM
          example: 500
    OmPendingDeletion:
      type: object
      description: |
        Map of pending deletion sizes by category at the OM level (values in bytes).
        Common keys: `pendingDirectorySize`, `pendingKeySize`.
      additionalProperties:
        type: integer
        format: int64
      example:
        pendingDirectorySize: 204800
        pendingKeySize: 1048576
    EntityReadAccessHeatMap:
      type: object
      description: |
        Nested tree node used by `/heatmap/readaccess`. The root has `label: "root"` and `path: "/"`;
        children represent volumes, then buckets, then directories, then keys.
      properties:
        label:
          type: string
          example: vol1
        path:
          type: string
          example: /vol1
        size:
          type: integer
          format: int64
          description: Aggregate size in bytes of this entity.
        accessCount:
          type: integer
          format: int64
          description: Access count for this entity within the queried time window.
        minAccessCount:
          type: integer
          format: int64
        maxAccessCount:
          type: integer
          format: int64
        color:
          type: number
          format: double
          description: Normalized color value (heatmap intensity).
        children:
          type: array
          items:
            $ref: '#/components/schemas/EntityReadAccessHeatMap'
    ScmDbSnapshotSyncStatus:
      type: string
      description: Overall state of a triggered SCM DB snapshot sync.
      enum:
        - IDLE
        - IN_PROGRESS
        - SUCCESS
        - FAILED
        - CANCELLED
    ScmDbSnapshotSyncPhase:
      type: string
      description: |
        Sub-phase of the active sync. Used to decide whether cancellation is still possible
        (cancellable up to and including `DOWNLOADING_CHECKPOINT`; not cancellable from
        `INITIALIZING_DB` onwards).
      enum:
        - NONE
        - DOWNLOADING_CHECKPOINT
        - INITIALIZING_DB
        - SWAPPING_DB
        - COMPLETED
        - FAILED
        - CANCELLED
    ScmDbSnapshotTriggerResponse:
      type: object
      properties:
        accepted:
          type: boolean
          description: Whether the trigger request actually started a new sync.
          example: true
        status:
          $ref: '#/components/schemas/ScmDbSnapshotSyncStatus'
        message:
          type: string
          example: SCM DB snapshot sync started.
    ScmDbSnapshotStatusResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ScmDbSnapshotSyncStatus'
        phase:
          $ref: '#/components/schemas/ScmDbSnapshotSyncPhase'
        startedAt:
          type: integer
          format: int64
          description: Epoch millis when the current/last sync started; `0` if never run.
          example: 1718640123456
        finishedAt:
          type: integer
          format: int64
          description: Epoch millis when the current/last sync ended; `0` while still running.
          example: 0
        durationMs:
          type: integer
          format: int64
          description: Elapsed time in millis; for a running sync, computed against `now()`.
          example: 12345
        cancelAllowed:
          type: boolean
          description: True only while still in a cancellable phase.
          example: true
        lastError:
          type: string
          nullable: true
          description: Failure message from the last sync, if any.
          example: null
    ScmDbSnapshotCancelResponse:
      type: object
      properties:
        cancelled:
          type: boolean
          description: Whether the cancel actually took effect.
          example: true
        status:
          $ref: '#/components/schemas/ScmDbSnapshotSyncStatus'
        phase:
          $ref: '#/components/schemas/ScmDbSnapshotSyncPhase'
        message:
          type: string
          example: SCM DB snapshot sync cancelled.
