      type: object
      properties:
        error:
          type: string
          example: Too Many Requests
        message:
          type: string
          example: Export queue is full; please retry later.
    DownloadLimitReachedError:
      type: object
      description: |
        Returned by `GET /containers/unhealthy/export/{jobId}/download` with HTTP 429 when the
        per-job download limit has been reached. Same shape as `RateLimitedError` but with a
        distinct `error` discriminator string so clients can branch on it.
      properties:
        error:
          type: string
          example: Download limit reached
        message:
          type: string
          example: This export has reached its maximum download limit of 3.
